# =====================================================================
#  AAIdrive – build wersji Google Maps + Spotify (flavor "gmap")
#  WERSJA 3 – Spotify wlaczone (Client ID z sekretu)
# =====================================================================

name: build-gmap

on:
  workflow_dispatch:

env:
  AndroidAutoIdrive_GmapsApiKey: ${{ secrets.ANDROIDAUTOIDRIVE_GMAPSAPIKEY }}
  AndroidAutoIdrive_SpotifyApiKey: ${{ secrets.ANDROIDAUTOIDRIVE_SPOTIFYAPIKEY }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (z submodulami IDriveConnectKit)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Pobranie tagow wersji z upstream (naprawia versionCode)
        run: git fetch --force --tags https://github.com/BimmerGestalt/AAIdrive.git

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Pobranie zaleznosci (certyfikaty BMW Connected)
        uses: ./.github/actions/download-externals-action

      - name: Staly klucz debug (spojny podpis dla Spotify + Aktualizuj)
        run: |
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > "$GITHUB_WORKSPACE/debug.keystore"
          echo "Zapisano $GITHUB_WORKSPACE/debug.keystore. Oczekiwany SHA-1:"
          keytool -list -v -keystore "$GITHUB_WORKSPACE/debug.keystore" -storepass android -alias androiddebugkey 2>/dev/null | grep -i "SHA1:" || true

      - name: Build flavor Google Maps + Spotify (APK debug)
        run: ./gradlew assembleGmapNonalyticsFullDebug --stacktrace

      - name: Weryfikacja PRAWDZIWEGO podpisu zbudowanego APK
        run: |
          APK=$(find app/build/outputs/apk/gmapNonalyticsFull/debug -name '*.apk' | head -1)
          echo "APK: $APK"
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner 2>/dev/null | sort -V | tail -1)
          echo "=== apksigner (SHA-1 podpisu APK) ==="
          "$APKSIGNER" verify --print-certs "$APK" 2>/dev/null | grep -i "SHA-1" || true
          echo "=== keytool fallback ==="
          keytool -printcert -jarfile "$APK" 2>/dev/null | grep -i "SHA1" || true

      - name: Wrzucenie APK do artefaktow builda
        uses: actions/upload-artifact@v4
        with:
          name: aaidrive-gmap-apk
          retention-days: 14
          path: app/build/outputs/apk/gmapNonalyticsFull/debug/*.apk
